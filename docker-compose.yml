services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: typing-app-backend
    ports:
      - "8000:8000"
    environment:
      - DEBUG=False
      - ADAPTER_TYPE=rule_based
      - DATABASE_URL=sqlite:///./typing_trainer.db
      - SECRET_KEY=${SECRET_KEY:-your-secret-key-change-in-production}
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: typing-app-frontend
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=http://localhost:8000/api/v1
    depends_on:
      - backend
    command: serve -s dist -l 3000
